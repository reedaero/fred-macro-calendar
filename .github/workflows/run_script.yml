name: Update Eco Calendar

on:
  schedule:
    # Runs at 00:00 UTC every Sunday night
    - cron: '0 0 * * 0'
  workflow_dispatch: # Adds the manual run button

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Forces the actions to run on the modern Node 24 environment
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests ics pytz

    - name: Run script
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python eco_ical.py

    - name: Commit and Push .ics file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Pull any remote changes to prevent exit code 128 conflicts
        git pull origin main --rebase
        
        git add major_us_eco_calendar.ics
        
        if git diff --staged --quiet; then
          echo "No changes to the calendar file detected."
        else
          git commit -m "Automated Sync: Updated major economic calendar"
          git push origin main
        fi
